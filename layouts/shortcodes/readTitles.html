<details>
<summary><b>Click to Expand the Completed Books List</b></summary>
<table>
  <tr><th>Series Name</th><th>Volume Name</th></tr>
  {{range .Site.Data.completedBooks | collections.Reverse}}
  {{$link:=index (.series.metadata.webLinks) 0}}
  <tr>
      <td><a href="{{$link}}">{{.series.name}}</a></td>
      <td>{{.volume.name}}</td>
  </tr>
  {{end}}
</table>
</details>
